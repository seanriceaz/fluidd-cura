name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build release from changelog fragments
        id: release
        run: python3 .github/scripts/release.py

      - name: Commit version bump and changelog
        if: steps.release.outputs.released == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION CHANGELOG.md changelog.d
          git commit -m "chore(release): v${{ steps.release.outputs.version }} [skip release]"
          git tag "v${{ steps.release.outputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ steps.release.outputs.version }}"

      - name: Create GitHub Release
        if: steps.release.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.release.outputs.version }}" \
            --title "v${{ steps.release.outputs.version }}" \
            --notes-file "${{ steps.release.outputs.notes_file }}" \
            --repo "${{ github.repository }}"
