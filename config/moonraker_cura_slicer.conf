# =============================================================================
#  moonraker_cura_slicer.conf
#
#  Configuration snippet for the Cura Slicer Moonraker component.
#
#  HOW TO USE:
#    Append the [cura_slicer] section below to your moonraker.conf, or
#    add an include directive:
#
#      [include /path/to/moonraker_cura_slicer.conf]
#
#  The install.sh script adds this section automatically.
# =============================================================================

[cura_slicer]

# Path to the CuraEngine binary.
# Default: "CuraEngine" (searches PATH)
# Uncomment and set an absolute path if CuraEngine is not on PATH:
#
# cura_engine_path: /usr/bin/CuraEngine
# cura_engine_path: /usr/local/bin/CuraEngine
