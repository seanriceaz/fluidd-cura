# =============================================================================
#  moonraker_cura_slicer.conf
#
#  Configuration snippet for the Cura Slicer Moonraker component.
#
#  HOW TO USE:
#    Append the [cura_slicer] section below to your moonraker.conf, or
#    add an include directive:
#
#      [include /path/to/moonraker_cura_slicer.conf]
#
#  The install.sh script adds this section automatically.
# =============================================================================

[cura_slicer]

# Path to the CuraEngine binary.
# Default: "CuraEngine" (searches PATH)
# Uncomment and set an absolute path if CuraEngine is not on PATH:
#
# cura_engine_path: /usr/bin/CuraEngine
# cura_engine_path: /usr/local/bin/CuraEngine

# =============================================================================
#  Update detection (Fluidd → Settings → Update Manager)
#
#  Without this section, Moonraker has no way to know this repo exists, so
#  Fluidd will never show update notifications for it — install.sh adds this
#  automatically, but if you installed manually or upgraded from an older
#  version, add it yourself (adjust "path" to where you cloned the repo):
# =============================================================================

[update_manager fluidd_cura]
type: git_repo
path: ~/fluidd-cura
origin: https://github.com/seanriceaz/fluidd-cura.git
primary_branch: main
managed_services: moonraker
install_script: scripts/deploy_ui.sh
is_system_service: False
