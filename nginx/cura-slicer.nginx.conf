# =============================================================================
#  cura-slicer.nginx.conf
#
#  Nginx location block for the Cura Slicer web UI.
#
#  How to use:
#    Option A (recommended): The install.sh script handles this automatically.
#
#    Option B (manual):
#      1. Copy this file to /etc/nginx/snippets/cura-slicer.conf
#      2. Add the following line inside your server { } block
#         (typically /etc/nginx/sites-enabled/fluidd):
#
#           include snippets/cura-slicer.conf;
#
#      3. Run: sudo nginx -t && sudo systemctl reload nginx
#
#  The UI will then be accessible at:
#    http://<printer-ip>/cura-slicer/
# =============================================================================

location /cura-slicer/ {
    alias /var/www/cura-slicer/;
    index index.html;
    try_files $uri $uri/ /cura-slicer/index.html;

    # Allow embedding in Fluidd iframe
    add_header X-Frame-Options "SAMEORIGIN";
    add_header Content-Security-Policy "frame-ancestors 'self'";
}
